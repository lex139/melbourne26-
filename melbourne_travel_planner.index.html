<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Melbourne Travel Planner — 4–12 Sep 2025</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Arial,sans-serif;background:#f0f2f5;min-height:100vh;display:flex;flex-direction:column;align-items:center;padding:16px}
.shell{display:flex;flex-direction:column;height:90vh;max-height:820px;width:100%;max-width:1100px;border:1px solid #d1d5db;border-radius:14px;overflow:hidden;background:#fff;box-shadow:0 2px 12px rgba(0,0,0,0.08)}
.topbar{display:flex;align-items:center;gap:8px;padding:10px 14px;border-bottom:1px solid #e5e7eb;background:#f9fafb;flex-shrink:0;flex-wrap:wrap}
.trip-title{font-size:13px;font-weight:600;color:#111827;margin-right:4px;white-space:nowrap}
.day-tabs{display:flex;gap:4px;flex-wrap:wrap;flex:1}
.day-btn{font-size:11px;padding:4px 9px;border-radius:20px;border:1px solid #d1d5db;background:transparent;color:#6b7280;cursor:pointer;white-space:nowrap;transition:all 0.15s}
.day-btn:hover{background:#f3f4f6}
.day-btn.active{background:#1c2d4a;color:#fff;border-color:#1c2d4a}
.view-toggle{display:flex;border:1px solid #d1d5db;border-radius:8px;overflow:hidden;flex-shrink:0}
.view-btn{font-size:11px;padding:5px 12px;border:none;background:transparent;color:#6b7280;cursor:pointer;transition:all 0.15s}
.view-btn:hover{background:#f3f4f6}
.view-btn.active{background:#1c2d4a;color:#fff}
.main{display:flex;flex:1;overflow:hidden}
.plan-panel{width:52%;border-right:1px solid #e5e7eb;overflow-y:auto;flex-shrink:0;transition:width 0.2s}
.map-panel{flex:1;overflow:hidden;transition:all 0.2s}
.day-header{padding:12px 14px 8px;border-bottom:1px solid #e5e7eb;background:#f9fafb;position:sticky;top:0;z-index:2}
.day-header h2{font-size:14px;font-weight:600;color:#111827}
.day-header p{font-size:11px;color:#6b7280;margin-top:2px}
.stop-list{padding:8px 0}
.stop{display:flex;gap:0;cursor:pointer;transition:background 0.1s}
.stop:hover{background:#f0f9ff}
.stop.active-stop{background:#eff6ff}
.stop-left{display:flex;flex-direction:column;align-items:center;width:44px;flex-shrink:0;padding-top:14px}
.stop-num{width:22px;height:22px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:600;color:#fff;flex-shrink:0}
.stop-line{width:2px;flex:1;min-height:12px;margin-top:4px;border-radius:1px}
.stop-body{flex:1;padding:12px 14px 12px 4px;border-bottom:1px solid #f3f4f6}
.stop:last-child .stop-body{border-bottom:none}
.stop-time{font-size:11px;color:#9ca3af;margin-bottom:2px}
.stop-name{font-size:13px;font-weight:600;color:#111827;margin-bottom:3px}
.stop-detail{font-size:12px;color:#6b7280;line-height:1.5}
.stop-tags{display:flex;gap:4px;flex-wrap:wrap;margin-top:5px}
.tag{font-size:10px;padding:2px 7px;border-radius:10px;border:1px solid #e5e7eb;color:#6b7280;background:#f9fafb}
.transport-row{display:flex;align-items:center;gap:6px;padding:3px 14px 3px 54px;font-size:10px;color:#9ca3af;font-style:italic}
.cost-badge{font-size:10px;padding:2px 7px;border-radius:10px;background:#f0fdf4;color:#15803d;border:1px solid #bbf7d0;margin-left:auto;white-space:nowrap;flex-shrink:0}
.map-placeholder{width:100%;height:100%;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:14px;background:#f9fafb;padding:24px}
.map-placeholder .map-icon{width:56px;height:56px;border-radius:14px;background:#e5e7eb;display:flex;align-items:center;justify-content:center}
.map-placeholder h3{font-size:14px;font-weight:600;color:#374151}
.map-placeholder p{font-size:12px;color:#6b7280;text-align:center;max-width:280px;line-height:1.6}
.open-map-btn{font-size:12px;padding:9px 18px;border-radius:8px;border:1px solid #d1d5db;background:#fff;color:#374151;cursor:pointer;font-weight:500;transition:all 0.15s}
.open-map-btn:hover{background:#f3f4f6;border-color:#9ca3af}
.map-stops-list{width:100%;max-width:300px}
.map-stop-item{display:flex;align-items:center;gap:8px;padding:6px 0;border-bottom:1px solid #f3f4f6;cursor:pointer;transition:background 0.1s;border-radius:6px;padding:6px 8px}
.map-stop-item:hover{background:#f0f9ff}
.map-stop-num{width:20px;height:20px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:600;color:#fff;flex-shrink:0}
.map-stop-info{flex:1}
.map-stop-name{font-size:12px;font-weight:500;color:#374151}
.map-stop-time{font-size:10px;color:#9ca3af}
.map-link{font-size:10px;color:#3b82f6;text-decoration:none;margin-left:auto;white-space:nowrap}

/* day color themes */
.c0{background:#1c2d4a}.c1{background:#1a7a7a}.c2{background:#c44a6a}
.c3{background:#5c3d7a}.c4{background:#4a5c6a}.c5{background:#3d6b52}
.c6{background:#c45c4a}.c7{background:#1c2d4a}
.l0{background:#dde7f0}.l1{background:#d0ebeb}.l2{background:#f5dde5}
.l3{background:#e8ddf5}.l4{background:#dde5ed}.l5{background:#ddeee3}
.l6{background:#f5e2de}.l7{background:#dde7f0}
</style>

let activeDay = 1;
let activeView = 'both';

function buildTabs(){
  const tabs = document.getElementById('dayTabs');
  DAYS.forEach((d,i)=>{
    const b = document.createElement('button');
    b.className = 'day-btn' + (i===activeDay?' active':'');
    b.textContent = d.label + ' · ' + d.shortDate;
    b.onclick = ()=>selectDay(i);
    tabs.appendChild(b);
  });
}

function selectDay(i){
  activeDay = i;
  document.querySelectorAll('.day-btn').forEach((b,j)=>b.classList.toggle('active',j===i));
  renderPlan();
  renderMapPanel();
}

function renderPlan(){
  const day = DAYS[activeDay];
  document.getElementById('dayTitle').textContent = day.title;
  document.getElementById('daySubtitle').textContent = day.subtitle;
  const list = document.getElementById('stopList');
  list.innerHTML = '';
  day.stops.forEach((s,i)=>{
    const isLast = i===day.stops.length-1;
    const row = document.createElement('div');
    row.className = 'stop';
    row.innerHTML = `
      <div class="stop-left">
        <div class="stop-num c${day.color}">${i+1}</div>
        ${!isLast?`<div class="stop-line l${day.color}"></div>`:''}
      </div>
      <div class="stop-body">
        <div class="stop-time">${s.time}</div>
        <div style="display:flex;align-items:flex-start;justify-content:space-between;gap:8px">
          <div class="stop-name">${s.name}</div>
          ${s.cost?`<span class="cost-badge">${s.cost}</span>`:''}
        </div>
        <div class="stop-detail">${s.detail}</div>
        <div class="stop-tags">${s.tags.map(t=>`<span class="tag">${t}</span>`).join('')}</div>
      </div>`;
    row.onclick = ()=>{
      const url = `https://www.google.com/maps/search/?api=1&query=${encodeURIComponent(s.name+', Melbourne')}`;
      window.open(url,'_blank');
    };
    list.appendChild(row);
    if(!isLast){
      const div = document.createElement('div');
      div.className='transport-row';
      div.textContent='↓';
      list.appendChild(div);
    }
  });
}

function renderMapPanel(){
  const day = DAYS[activeDay];
  document.getElementById('mapDayTitle').textContent = day.title + ' — ' + day.stops.length + ' stops';
  const sl = document.getElementById('mapStopsList');
  sl.innerHTML = '';
  day.stops.forEach((s,i)=>{
    const item = document.createElement('div');
    item.className = 'map-stop-item';
    item.innerHTML = `
      <div class="map-stop-num c${day.color}">${i+1}</div>
      <div class="map-stop-info">
        <div class="map-stop-name">${s.name}</div>
        <div class="map-stop-time">${s.time}${s.cost?' · '+s.cost:''}</div>
      </div>
      <a class="map-link" href="https://www.google.com/maps/search/?api=1&query=${encodeURIComponent(s.name+', Melbourne')}" target="_blank">Maps ↗</a>`;
    sl.appendChild(item);
  });
}

function openDayMap(){
  const day = DAYS[activeDay];
  const stops = day.stops.filter(s=>s.lat&&s.lng);
  if(!stops.length) return;
  const origin = encodeURIComponent(stops[0].lat+','+stops[0].lng);
  const dest = encodeURIComponent(stops[stops.length-1].lat+','+stops[stops.length-1].lng);
  const wps = stops.slice(1,-1).map(s=>s.lat+','+s.lng).join('|');
  let url = `https://www.google.com/maps/dir/?api=1&origin=${origin}&destination=${dest}`;
  if(wps) url += `&waypoints=${encodeURIComponent(wps)}`;
  window.open(url,'_blank');
}

function setView(v){
  activeView = v;
  ['vBoth','vPlan','vMap'].forEach(id=>document.getElementById(id).classList.remove('active'));
  document.getElementById('v'+v.charAt(0).toUpperCase()+v.slice(1)).classList.add('active');
  const plan = document.getElementById('planPanel');
  const map = document.getElementById('mapPanel');
  if(v==='both'){plan.style.cssText='width:52%;display:';map.style.cssText='flex:1;display:';}
  else if(v==='plan'){plan.style.cssText='width:100%;display:';map.style.display='none';}
  else{plan.style.display='none';map.style.cssText='flex:1;display:';}
}

buildTabs();
